# OCR Document Scanner — Nginx API Gateway
# Proxies all public traffic to the Flask backend and enforces rate limits.

upstream ocr_backend {
    server ocr-scanner:5000;
}

# Rate-limit zone keyed on X-API-Key header (60 req/min default)
limit_req_zone $http_x_api_key zone=api_key:10m rate=60r/m;
# Fallback zone keyed on client IP
limit_req_zone $binary_remote_addr zone=ip:10m rate=120r/m;

server {
    listen 80;
    server_name _;

    # Redirect to HTTPS if certs are present (uncomment below)
    # return 301 https://$host$request_uri;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request body size (match Flask MAX_CONTENT_LENGTH) ───────────────
    client_max_body_size 16m;

    # ── Health check — no rate limit ─────────────────────────────────────
    location = /health {
        proxy_pass http://ocr_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Swagger docs — no rate limit ─────────────────────────────────────
    location /api/docs {
        proxy_pass http://ocr_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /flasgger_static {
        proxy_pass http://ocr_backend;
    }
    location /apispec_1.json {
        proxy_pass http://ocr_backend;
    }

    # ── Prometheus metrics — internal only ───────────────────────────────
    location /metrics {
        deny all;
        return 403;
    }

    # ── WebSocket upgrade (/ws) ──────────────────────────────────────────
    location /ws {
        proxy_pass http://ocr_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ── All other requests — rate limited ────────────────────────────────
    location / {
        # Apply API-key rate limit if header is present, else fall back to IP
        limit_req zone=api_key burst=20 nodelay;
        limit_req zone=ip burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://ocr_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long OCR processing
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }
}

# ── Optional HTTPS server block ──────────────────────────────────────────
